name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # 1. Configuramos Node.js primero
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      # 2. Instalamos las dependencias
      - run: npm ci

      # 3. Comprobamos el formateo de código localmente sin pasar por Nx Cloud
      - run: npx nx format:check --base="remotes/origin/main"

      # 4. Lanzamos la batería de tareas del monorepo de forma local
      - run: npx nx run-many -t lint test build typecheck
